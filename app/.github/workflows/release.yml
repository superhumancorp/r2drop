# .github/workflows/release.yml
# Release pipeline for R2Drop macOS app.
# Triggers on v* tags (e.g. v0.1.0, v1.0.0).
# Builds, signs, notarizes, packages as .dmg, generates Sparkle appcast entry,
# and publishes everything to GitHub Releases.

name: Release

on:
  push:
    tags:
      - "v*"

# Only one release at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ENGINE_DIR: src/app/engine
  APP_DIR: src/app
  SPARKLE_CLI_VERSION: 2.9.0

jobs:
  release:
    name: Build, Sign & Publish
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------
      # Checkout & toolchain
      # -----------------------------------------------------------------
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.ENGINE_DIR }}/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('src/app/engine/**/Cargo.lock', 'src/app/engine/**/Cargo.toml') }}
          restore-keys: rust-release-${{ runner.os }}-

      # -----------------------------------------------------------------
      # Quality gates
      # -----------------------------------------------------------------
      - name: Clippy lint
        run: cargo clippy --workspace -- -D warnings
        working-directory: ${{ env.ENGINE_DIR }}

      - name: Run Rust tests
        run: cargo test --workspace
        working-directory: ${{ env.ENGINE_DIR }}

      # -----------------------------------------------------------------
      # Build Rust universal binary (ARM + x86_64)
      # -----------------------------------------------------------------
      - name: Build Rust static library
        run: ./scripts/build-rust.sh --release
        working-directory: ${{ env.APP_DIR }}

      # -----------------------------------------------------------------
      # Extract version from tag
      # -----------------------------------------------------------------
      - name: Extract version
        id: version
        run: |
          # Strip leading "v" from tag (v0.1.0 -> 0.1.0)
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (tag: $TAG)"

      # -----------------------------------------------------------------
      # Import Apple signing certificate
      # -----------------------------------------------------------------
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode the .p12 certificate from base64
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompts
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Export the signing identity name for later steps
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"

      # -----------------------------------------------------------------
      # Build macOS app (Release, signed)
      # -----------------------------------------------------------------
      - name: Build Xcode workspace (Release)
        run: |
          xcodebuild build \
            -workspace R2Drop.xcworkspace \
            -scheme "R2Drop Production" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--options=runtime" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            | xcpretty
        working-directory: ${{ env.APP_DIR }}

      - name: Locate built .app
        id: app
        run: |
          APP_PATH="$(find build/DerivedData/Build/Products/Release -name 'R2Drop.app' -maxdepth 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Error: R2Drop.app not found in build output"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "App: $APP_PATH"
        working-directory: ${{ env.APP_DIR }}

      # -----------------------------------------------------------------
      # Notarize with Apple
      # -----------------------------------------------------------------
      - name: Create ZIP for notarization
        run: |
          ditto -c -k --keepParent \
            "${{ steps.app.outputs.path }}" \
            "$RUNNER_TEMP/R2Drop-notarize.zip"

      - name: Submit for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/R2Drop-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 1800

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "${{ steps.app.outputs.path }}"
          xcrun stapler validate "${{ steps.app.outputs.path }}"

      # -----------------------------------------------------------------
      # Package as .dmg
      # -----------------------------------------------------------------
      - name: Generate DMG
        run: |
          ./scripts/generate-dmg.sh \
            --app "${{ steps.app.outputs.path }}" \
            --sign "$SIGN_IDENTITY"
        working-directory: ${{ env.APP_DIR }}

      - name: Locate DMG
        id: dmg
        run: |
          DMG_PATH="$(find build -name 'R2Drop-*.dmg' -maxdepth 1)"
          DMG_NAME="$(basename "$DMG_PATH")"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "DMG: $DMG_PATH ($DMG_NAME)"
        working-directory: ${{ env.APP_DIR }}

      # -----------------------------------------------------------------
      # Notarize the DMG too
      # -----------------------------------------------------------------
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 1800
          xcrun stapler staple "${{ steps.dmg.outputs.path }}"
        working-directory: ${{ env.APP_DIR }}

      # -----------------------------------------------------------------
      # Generate Sparkle appcast entry
      # -----------------------------------------------------------------
      - name: Generate Sparkle appcast
        id: appcast
        env:
          SPARKLE_ED25519_KEY: ${{ secrets.SPARKLE_ED25519_KEY }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG_PATH="${{ steps.dmg.outputs.path }}"
          DMG_NAME="${{ steps.dmg.outputs.name }}"

          # Compute file size and Ed25519 signature length for the enclosure
          FILE_SIZE=$(stat -f%z "$DMG_PATH")

          # Build date in RFC 2822 format for the appcast
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")

          # Download URL on GitHub Releases
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${DMG_NAME}"

          SPARKLE_KEY="${SPARKLE_ED25519_KEY:-${SPARKLE_PRIVATE_KEY:-}}"
          SPARKLE_KEY="$(printf '%s' "$SPARKLE_KEY" | tr -d '\r\n')"
          if [ -z "$SPARKLE_KEY" ]; then
            echo "Missing Sparkle private key secret. Set SPARKLE_ED25519_KEY (preferred) or SPARKLE_PRIVATE_KEY." >&2
            exit 1
          fi

          SPARKLE_ROOT="$RUNNER_TEMP/sparkle-${SPARKLE_CLI_VERSION}"
          SPARKLE_ARCHIVE="$RUNNER_TEMP/sparkle-${SPARKLE_CLI_VERSION}.tar.xz"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_CLI_VERSION}/Sparkle-${SPARKLE_CLI_VERSION}.tar.xz" \
            -o "$SPARKLE_ARCHIVE"
          rm -rf "$SPARKLE_ROOT"
          mkdir -p "$SPARKLE_ROOT"
          tar -xf "$SPARKLE_ARCHIVE" -C "$SPARKLE_ROOT"
          SIGN_TOOL="$SPARKLE_ROOT/bin/sign_update"
          if [ ! -x "$SIGN_TOOL" ]; then
            echo "sign_update not found at expected path: $SIGN_TOOL" >&2
            exit 1
          fi

          KEY_FILE="$RUNNER_TEMP/sparkle_private_key.txt"
          printf '%s' "$SPARKLE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          SIGN_OUTPUT=$("$SIGN_TOOL" "$DMG_PATH" -f "$KEY_FILE" 2>&1) || {
            echo "$SIGN_OUTPUT" >&2
            exit 1
          }
          SPARKLE_ED_SIG="$(printf '%s\n' "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature=\"\([^\"]*\)\".*/\1/p' | head -1)"
          rm -f "$KEY_FILE"

          if [ -z "$SPARKLE_ED_SIG" ]; then
            echo "Could not parse sparkle:edSignature from sign_update output." >&2
            echo "$SIGN_OUTPUT" >&2
            exit 1
          fi

          # Generate the appcast XML snippet
          APPCAST_PATH="$RUNNER_TEMP/appcast.xml"
          cat > "$APPCAST_PATH" << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>R2Drop</title>
              <link>https://github.com/${{ github.repository }}/releases</link>
              <description>R2Drop macOS app updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${{ github.run_number }}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${FILE_SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${SPARKLE_ED_SIG}"
                  sparkle:version="${{ github.run_number }}"
                  sparkle:shortVersionString="${VERSION}" />
              </item>
            </channel>
          </rss>
          XMLEOF

          echo "path=$APPCAST_PATH" >> "$GITHUB_OUTPUT"
          echo "Appcast generated at $APPCAST_PATH"
        working-directory: ${{ env.APP_DIR }}

      # -----------------------------------------------------------------
      # Publish to GitHub Releases
      # -----------------------------------------------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="${{ env.APP_DIR }}/${{ steps.dmg.outputs.path }}"
          APPCAST_PATH="${{ steps.appcast.outputs.path }}"

          gh release create "$TAG" \
            --title "R2Drop $VERSION" \
            --generate-notes \
            "$DMG_PATH" \
            "${APPCAST_PATH}#appcast.xml"

      # -----------------------------------------------------------------
      # Cleanup
      # -----------------------------------------------------------------
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
