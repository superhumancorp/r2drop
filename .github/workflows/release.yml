name: Release
on:
  push:
    tags: ['v*']

env:
  SCHEME: R2Drop
  PROJECT: src/app/R2Drop.xcodeproj

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Build & Archive (Apple Silicon)
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/R2Drop-arm64.xcarchive \
            ARCHS=arm64

      - name: Build & Archive (Intel)
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/R2Drop-x86_64.xcarchive \
            ARCHS=x86_64

      - name: Export .app bundles
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          EOF
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/R2Drop-arm64.xcarchive -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist -exportPath $RUNNER_TEMP/export-arm64
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/R2Drop-x86_64.xcarchive -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist -exportPath $RUNNER_TEMP/export-x86_64

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for arch in arm64 x86_64; do
            APP_PATH="$RUNNER_TEMP/export-$arch/R2Drop.app"
            DMG_NAME="R2Drop-${{ steps.version.outputs.version }}-${arch/arm64/aarch64}.dmg"
            hdiutil create -volname "R2Drop" -srcfolder "$APP_PATH" -ov -format UDZO "$RUNNER_TEMP/$DMG_NAME"
            xcrun notarytool submit "$RUNNER_TEMP/$DMG_NAME" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$RUNNER_TEMP/$DMG_NAME"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "R2Drop v$VERSION" \
            --generate-notes \
            "$RUNNER_TEMP/R2Drop-$VERSION-aarch64.dmg" \
            "$RUNNER_TEMP/R2Drop-$VERSION-x86_64.dmg"

      - name: Trigger tap bump
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: superhumancorp/homebrew-tap
          event-type: new-release
