name: CLI Release
on:
  push:
    tags: ['cli-v*']

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            os_slug: macos
            asset_arch: arm64
          - os: macos-14
            target: x86_64-apple-darwin
            os_slug: macos
            asset_arch: x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            os_slug: linux
            asset_arch: x86_64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            os_slug: linux
            asset_arch: arm64
            use_cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Build CLI
        run: |
          cd src/app/engine/r2-cli
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          BINARY="src/app/engine/r2-cli/target/${{ matrix.target }}/release/r2drop"
          [ -f "$BINARY.exe" ] && BINARY="$BINARY.exe"
          TARBALL="r2drop-${{ matrix.os_slug }}-${{ matrix.asset_arch }}.tar.gz"
          tar czf "$TARBALL" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Ensure CLI release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release view "$VERSION" >/dev/null 2>&1 || \
            gh release create "$VERSION" \
              --title "R2Drop CLI ${VERSION#cli-v}" \
              --notes "R2Drop CLI release ${VERSION#cli-v}" || \
            gh release view "$VERSION" >/dev/null 2>&1

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release upload "$VERSION" "$TARBALL" --clobber
