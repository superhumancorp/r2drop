name: TestFlight
on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version (e.g. 0.1.0)'
        required: false
        default: '0.1.0'

env:
  WORKING_DIR: src/app

jobs:
  testflight:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Import signing certificates
        env:
          DIST_P12: ${{ secrets.APPLE_DIST_CERTIFICATE_BASE64 }}
          DIST_PASSWORD: ${{ secrets.APPLE_DIST_CERTIFICATE_PASSWORD }}
          INSTALLER_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          INSTALLER_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$DIST_P12" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -P "$DIST_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          echo "$INSTALLER_P12" | base64 --decode > $RUNNER_TEMP/installer.p12
          security import $RUNNER_TEMP/installer.p12 -P "$INSTALLER_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          PROFILE_APP: ${{ secrets.PROVISIONING_PROFILE_DIST }}
          PROFILE_FINDER: ${{ secrets.PROVISIONING_PROFILE_FINDER_EXT }}
          PROFILE_QUICK: ${{ secrets.PROVISIONING_PROFILE_QUICKACTION_EXT }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          install_profile() {
            local b64="$1" varname="$2"
            local path="$RUNNER_TEMP/${varname}.provisionprofile"
            echo "$b64" | base64 --decode > "$path"
            local uuid=$(security cms -D -i "$path" | plutil -extract UUID raw -)
            cp "$path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.provisionprofile"
            echo "${varname}=$uuid" >> "$GITHUB_ENV"
          }
          install_profile "$PROFILE_APP" "PROVISIONING_PROFILE_UUID"
          install_profile "$PROFILE_FINDER" "PROVISIONING_PROFILE_FINDER_EXTENSION_UUID"
          install_profile "$PROFILE_QUICK" "PROVISIONING_PROFILE_QUICKACTION_EXTENSION_UUID"

      - name: Set up Ruby & Fastlane
        run: |
          bundle install

      - name: Run Fastlane TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: "true"
          BUILD_NUMBER: ${{ github.run_number }}
          MARKETING_VERSION: ${{ inputs.marketing_version }}
        run: |
          bundle exec fastlane upload_testflight
