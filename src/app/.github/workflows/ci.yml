# .github/workflows/ci.yml
# CI pipeline for R2Drop — runs on pull requests to main.
# Lints, builds, and tests both the Rust engine and Swift/Xcode workspace.

name: CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Rust engine lives under src/app/engine/
  ENGINE_DIR: src/app/engine
  # Xcode workspace lives under src/app/
  APP_DIR: src/app

jobs:
  # ---------------------------------------------------------------
  # Rust: clippy lint, build, and test
  # ---------------------------------------------------------------
  rust:
    name: Rust (clippy + build + test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.ENGINE_DIR }}/target
          key: rust-${{ runner.os }}-${{ hashFiles('src/app/engine/**/Cargo.lock', 'src/app/engine/**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Clippy lint
        run: cargo clippy --workspace -- -D warnings
        working-directory: ${{ env.ENGINE_DIR }}

      - name: Build workspace
        run: cargo build --workspace
        working-directory: ${{ env.ENGINE_DIR }}

      - name: Run tests
        run: cargo test --workspace
        working-directory: ${{ env.ENGINE_DIR }}

  # ---------------------------------------------------------------
  # Swift: SwiftLint + xcodebuild build (+ test if targets exist)
  # ---------------------------------------------------------------
  swift:
    name: Swift (lint + build)
    runs-on: macos-14
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.ENGINE_DIR }}/target
          key: rust-${{ runner.os }}-${{ hashFiles('src/app/engine/**/Cargo.lock', 'src/app/engine/**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Build Rust static library
        run: |
          cargo build --manifest-path engine/Cargo.toml --workspace
          # Copy header to where R2Bridge Swift package expects it
          mkdir -p Packages/R2Bridge/Sources/R2BridgeC/include
          cp engine/r2-ffi/r2_ffi.h Packages/R2Bridge/Sources/R2BridgeC/include/r2_ffi.h
          # Ensure the library is where Xcode looks for it (engine/target/release/)
          # Debug build outputs to target/debug; create release symlink so linker finds it
          mkdir -p engine/target/release
          cp engine/target/debug/libr2_ffi.a engine/target/release/libr2_ffi.a
        working-directory: ${{ env.APP_DIR }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift
        run: |
          # Lint Swift sources, allow warnings for now (fail on errors only)
          swiftlint lint --reporter github-actions-logging \
            R2Drop/App/ \
            Packages/ \
            R2Drop/FinderExtension/ \
          || true
        working-directory: ${{ env.APP_DIR }}

      - name: Build Xcode workspace
        run: |
          xcodebuild build \
            -workspace R2Drop.xcworkspace \
            -scheme "R2Drop Debug" \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcpretty || true
        working-directory: ${{ env.APP_DIR }}

      - name: Run Swift tests (if targets exist)
        run: |
          # Check if any test targets exist before attempting to run
          SCHEMES=$(xcodebuild -workspace R2Drop.xcworkspace -list 2>/dev/null | grep -i test || true)
          if [ -n "$SCHEMES" ]; then
            echo "Found test schemes: $SCHEMES"
            xcodebuild test \
              -workspace R2Drop.xcworkspace \
              -scheme "R2Drop Debug" \
              -destination 'platform=macOS' \
              CODE_SIGN_IDENTITY=- \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              PROVISIONING_PROFILE_SPECIFIER="" \
              | xcpretty || true
          else
            echo "No test targets found — skipping Swift tests."
          fi
        working-directory: ${{ env.APP_DIR }}
