# .github/workflows/cli-release.yml
# Release pipeline for r2drop CLI binary.
# Triggers on cli-v* tags (e.g. cli-v0.1.0).
# Builds for macOS only (ARM + x86_64).
# Publishes macOS binaries to GitHub Releases.

name: CLI Release

on:
  push:
    tags:
      - "cli-v*"

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ENGINE_DIR: src/app/engine
  BINARY_NAME: r2drop

jobs:
  # -----------------------------------------------------------------
  # Quality gates (run once before building all platforms)
  # -----------------------------------------------------------------
  quality:
    name: Quality Gates
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.ENGINE_DIR }}/target
          key: rust-cli-quality-${{ runner.os }}-${{ hashFiles('src/app/engine/**/Cargo.lock', 'src/app/engine/**/Cargo.toml') }}
          restore-keys: rust-cli-quality-${{ runner.os }}-

      - name: Clippy lint
        run: cargo clippy --workspace -- -D warnings
        working-directory: ${{ env.ENGINE_DIR }}

      - name: Run tests
        run: cargo test --workspace
        working-directory: ${{ env.ENGINE_DIR }}

  # -----------------------------------------------------------------
  # Build matrix: compile CLI for macOS targets
  # -----------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: r2drop-macos-arm64
            ext: ""

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: r2drop-macos-x86_64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.ENGINE_DIR }}/target
          key: rust-cli-${{ matrix.target }}-${{ hashFiles('src/app/engine/**/Cargo.lock', 'src/app/engine/**/Cargo.toml') }}
          restore-keys: rust-cli-${{ matrix.target }}-

      - name: Build CLI binary
        run: cargo build -p r2-cli --release --target ${{ matrix.target }}
        working-directory: ${{ env.ENGINE_DIR }}

      # Package the binary into a tar.gz archive.
      - name: Package binary
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}"
          ARCHIVE="${{ matrix.artifact }}.tar.gz"
          chmod +x "$BINARY"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ env.BINARY_NAME }}${{ matrix.ext }}"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
        working-directory: ${{ env.ENGINE_DIR }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ENGINE_DIR }}/${{ env.ARCHIVE }}
          retention-days: 1

  # -----------------------------------------------------------------
  # Publish all platform binaries to GitHub Releases
  # -----------------------------------------------------------------
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#cli-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Collect all archive files
          FILES=$(find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \))

          gh release create "$TAG" \
            --title "R2Drop CLI $VERSION" \
            --generate-notes \
            $FILES
