name: TestFlight
on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version (e.g. 0.1.0)'
        required: false
        default: '0.1.0'

env:
  WORKING_DIR: src/app

jobs:
  testflight:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Import signing certificates
        env:
          DIST_P12: ${{ secrets.APPLE_DIST_CERTIFICATE_BASE64 }}
          DIST_PASSWORD: ${{ secrets.APPLE_DIST_CERTIFICATE_PASSWORD }}
          INSTALLER_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          INSTALLER_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$DIST_P12" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -P "$DIST_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          echo "$INSTALLER_P12" | base64 --decode > $RUNNER_TEMP/installer.p12
          security import $RUNNER_TEMP/installer.p12 -P "$INSTALLER_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Set up Ruby & Fastlane
        run: |
          bundle install

      - name: Build Rust FFI (release, universal)
        run: |
          ./scripts/build-rust.sh --release
          test -f engine/target/release/libr2_ffi.a
          lipo -info engine/target/release/libr2_ffi.a

      - name: Run Fastlane TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
          MARKETING_VERSION: ${{ inputs.marketing_version }}
        run: |
          bundle exec fastlane upload_testflight
